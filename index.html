<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LetterCam</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Roboto:wght@100..900&family=Open+Sans:wght@100..900&family=Lato:wght@100..900&family=Poppins:wght@100..900&family=Montserrat:wght@100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+Hebrew:wght@100..900&family=Noto+Sans+Arabic:wght@100..900&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Top-left: video source + recording + snapshot -->
    <div class="input-container">
        <button id="toggleInput">Switch Video Source</button>
        <input type="file" id="videoFile" accept="video/*" style="display: none;">
        <!-- recordButton and snapshotButton injected by JS -->
    </div>

    <!-- Top-right: character set + font selectors -->
    <div class="char-container">
        <div class="char-row">
            <label for="char-set-select">Characters:</label>
            <select id="char-set-select">
                <option value="english">A–Z English</option>
                <option value="hebrew">Hebrew אבג</option>
                <option value="katakana">Katakana アイウ</option>
                <option value="arabic">Arabic ابت</option>
                <option value="symbols">Symbols ╬▓◆</option>
                <option value="binary">Binary 01</option>
            </select>
        </div>
        <div class="char-row">
            <label for="font-select">Font:</label>
            <select id="font-select">
                <option value="Heebo">Heebo</option>
                <option value="Roboto">Roboto</option>
                <option value="Open Sans">Open Sans</option>
                <option value="Lato">Lato</option>
                <option value="Poppins">Poppins</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Noto Sans JP">Noto Sans JP</option>
                <option value="Noto Sans Hebrew">Noto Sans Hebrew</option>
                <option value="Noto Sans Arabic">Noto Sans Arabic</option>
            </select>
        </div>
    </div>

    <!-- Keyboard shortcuts help overlay -->
    <div id="help-overlay" class="hidden">
        <div id="help-box">
            <div class="help-title">Keyboard Shortcuts</div>
            <div class="help-row"><span class="help-key">S</span> Snapshot</div>
            <div class="help-row"><span class="help-key">R</span> Toggle Recording</div>
            <div class="help-row"><span class="help-key">M</span> Mirror</div>
            <div class="help-row"><span class="help-key">I</span> Invert brightness</div>
            <div class="help-row"><span class="help-key">1–6</span> Switch character set</div>
            <div class="help-row"><span class="help-key">?</span> Toggle this help</div>
        </div>
    </div>

    <!-- Sliders panel (scrolled to below the viewport) -->
    <div class="slider-container">
        <h2>Grid Controls</h2>
        <div class="slider-group">
            <div>
                <label for="resolution-slider">Resolution:</label>
                <input type="range" id="resolution-slider" min="5" max="50" value="20" step="1">
            </div>
            <div>
                <label for="letter-size-slider">Letter Size:</label>
                <input type="range" id="letter-size-slider" min="10" max="50" value="20" step="1">
            </div>
            <div>
                <label for="motion-sensitivity-slider">Motion Sensitivity:</label>
                <input type="range" id="motion-sensitivity-slider" min="1" max="50" value="15" step="1">
            </div>
            <div>
                <label for="color-speed-slider">Color Speed:</label>
                <input type="range" id="color-speed-slider" min="1" max="100" value="30" step="1">
            </div>
        </div>
        <h2>Color Controls</h2>
        <div class="slider-group">
            <div>
                <label for="hue-slider">Hue Shift:</label>
                <input type="range" id="hue-slider" min="0" max="360" value="0" step="1">
            </div>
            <div>
                <label for="saturation-slider">Saturation:</label>
                <input type="range" id="saturation-slider" min="0" max="100" value="100" step="1">
            </div>
            <div>
                <label for="scatter-frequency-slider">Scatter Frequency:</label>
                <input type="range" id="scatter-frequency-slider" min="1" max="20" value="2" step="1">
            </div>
        </div>
        <h2>Advanced Controls</h2>
        <div class="slider-group">
            <div>
                <label for="animation-direction-slider">Animation Wave:</label>
                <input type="range" id="animation-direction-slider" min="-1" max="1" value="0" step="0.1">
            </div>
            <div>
                <label for="grid-opacity-slider">Grid Opacity:</label>
                <input type="range" id="grid-opacity-slider" min="0.1" max="1" value="1" step="0.1">
            </div>
            <div>
                <label for="font-weight-slider">Font Weight:</label>
                <input type="range" id="font-weight-slider" min="100" max="900" value="400" step="100">
            </div>
            <div>
                <label for="trail-decay-slider">Trail Decay:</label>
                <input type="range" id="trail-decay-slider" min="0.05" max="1" value="1" step="0.05">
            </div>
            <div>
                <label for="fps-slider">FPS Limit:</label>
                <input type="range" id="fps-slider" min="1" max="60" value="60" step="1">
            </div>
        </div>
        <h2>Modes</h2>
        <div class="slider-group">
            <div>
                <label for="color-theme-select">Color Theme:</label>
                <select id="color-theme-select">
                    <option value="video">Video (original)</option>
                    <option value="mono">Monochrome</option>
                    <option value="matrix">Matrix (green)</option>
                    <option value="sepia">Sepia</option>
                    <option value="fire">Fire</option>
                    <option value="neon">Neon blue</option>
                </select>
            </div>
            <div>
                <label>Mirror:</label>
                <button id="mirror-btn" class="mode-btn">Off</button>
            </div>
            <div>
                <label>Invert brightness:</label>
                <button id="invert-btn" class="mode-btn">Off</button>
            </div>
            <div>
                <label>Help (?):</label>
                <button id="help-btn" class="mode-btn">Show</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
